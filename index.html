<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color:rgb(44,43,43);
            font-family:Arial, Helvetica, sans-serif;
        }

        .head{
            margin:auto;
            width:fit-content;
            font-size:50px;
            color:white;
            margin-top:50px;
        }

        .card{

            min-height:150px;

            width:95%;

            max-width:1500px;

            border-radius:15px;

            background-color:rgba(127,255,212,0.7);

            margin:auto;

            margin-top:50px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

            padding:20px;
        }

        .expensename p,
        .amount p,
        .category p,
        .date p{

            padding-bottom:10px;

            font-size:20px;
        }

        .expensename input,
        .amount input,
        .category input{

            height:40px;

            width:280px;

            border-radius:15px;

            border:none;

            outline:none;

            text-indent:20px;
        }

        .date input{

            height:40px;

            width:180px;

            border-radius:15px;

            border:none;

            outline:none;

            padding:10px;
        }

        .add{

            display:flex;

            align-items:center;

            margin-top:25px;
        }

        .btn{

            background:white;

            padding:12px 20px;

            border-radius:15px;

            cursor:pointer;

            font-weight:bold;

            transition:0.3s;
        }

        .btn:hover{

            background:black;

            color:white;
        }

        .totalBox{

            width:300px;

            margin:30px auto;

            background:white;

            border-radius:15px;

            text-align:center;

            padding:15px;

            font-size:28px;

            font-weight:bold;
        }

        .table-container{

            width:95%;

            max-width:1500px;

            margin:40px auto;
        }

        table{

            width:100%;

            border-collapse:collapse;

            background:white;

            border-radius:15px;

            overflow:hidden;
        }

        th{

            background:aquamarine;

            padding:15px;
        }

        td{

            text-align:center;

            padding:15px;
        }

        tr:nth-child(even){

            background:#f2f2f2;
        }

        .deleteBtn{

            border:none;

            background:red;

            color:white;

            padding:8px 15px;

            border-radius:10px;

            cursor:pointer;
        }

        .deleteBtn:hover{

            background:darkred;
        }

        @media(max-width:1200px){

            .card{

                justify-content:center;

                gap:20px;
            }

            .head{

                font-size:40px;
            }
        }

        @media(max-width:600px){

            .head{

                font-size:30px;
            }

            .expensename input,
            .amount input,
            .category input{

                width:250px;
            }

            .date input{

                width:250px;
            }
        }

    </style>

</head>

<body>

    <div class="head">

        Expense Tracker

    </div>


    <div class="card">

        <div class="expensename">

            <p>Expense Name</p>

            <input type="text" id="expenseName">

        </div>


        <div class="amount">

            <p>Amount</p>

            <input type="number" id="amount">

        </div>


        <div class="category">

            <p>Category</p>

            <input type="text" id="category">

        </div>


        <div class="date">

            <p>Date</p>

            <input type="date" id="date">

        </div>


        <div class="add">

            <div class="btn" onclick="addExpense()">

                Add Expense

            </div>

        </div>

    </div>


    <div class="totalBox">

        Total : ₹<span id="totalExpense">0</span>

    </div>


    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Expense Name</th>

                    <th>Amount</th>

                    <th>Category</th>

                    <th>Date</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>


    <script>

        let expenses = JSON.parse(localStorage.getItem("expenses")) || [];


        window.onload = function(){

            displayExpenses();

        }


        function addExpense(){

            let expenseName = document.getElementById("expenseName").value;

            let amount = document.getElementById("amount").value;

            let category = document.getElementById("category").value;

            let date = document.getElementById("date").value;


            if(expenseName==="" ||

               amount==="" ||

               category==="" ||

               date===""){

                alert("Please fill all fields");

                return;
            }


            let expense = {

                expenseName:expenseName,

                amount:amount,

                category:category,

                date:date

            };


            expenses.push(expense);


            localStorage.setItem(

                "expenses",

                JSON.stringify(expenses)

            );


            displayExpenses();


            document.getElementById("expenseName").value="";

            document.getElementById("amount").value="";

            document.getElementById("category").value="";

            document.getElementById("date").value="";

        }



        function displayExpenses(){

            let table = document.getElementById("tableBody");

            table.innerHTML = "";


            let total = 0;


            expenses.forEach((expense,index)=>{

                total += Number(expense.amount);


                table.innerHTML += `

                <tr>

                    <td>${expense.expenseName}</td>

                    <td>₹${expense.amount}</td>

                    <td>${expense.category}</td>

                    <td>${expense.date}</td>

                    <td>

                        <button

                        class="deleteBtn"

                        onclick="deleteExpense(${index})">

                        Delete

                        </button>

                    </td>

                </tr>

                `;

            });


            document.getElementById("totalExpense")

            .innerText = total;

        }



        function deleteExpense(index){

            expenses.splice(index,1);


            localStorage.setItem(

                "expenses",

                JSON.stringify(expenses)

            );


            displayExpenses();

        }

    </script>

</body>

</html>
